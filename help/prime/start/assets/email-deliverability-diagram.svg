<svg width="100%" viewBox="0 0 680 990" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Journey Optimizer B2B Prime — Email deliverability setup</title>
  <desc>Four-step email deliverability setup flowchart with square decision nodes, styled with Adobe brand colors.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .th { font-size: 14px; font-weight: 600; }
      .ts { font-size: 12px; font-weight: 400; }
    </style>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="30" text-anchor="middle" font-size="15" fill="#000000">Journey Optimizer B2B Prime — email deliverability setup</text>

  <!-- Legend -->
  <rect x="176" y="44" width="14" height="14" rx="3" fill="#ffffff" stroke="#FFA213" stroke-width="2"/>
  <text class="ts" x="195" y="56" fill="#000000">Customer action</text>
  <rect x="302" y="44" width="14" height="14" rx="3" fill="#ffffff" stroke="#9A47E2" stroke-width="2" stroke-dasharray="3 2"/>
  <text class="ts" x="321" y="56" fill="#000000">Not available in beta</text>

  <!-- Step 1 -->
  <rect x="220" y="74" width="240" height="44" rx="8" fill="#ffffff" stroke="#EB1000" stroke-width="2.5"/>
  <text class="th" x="340" y="96" text-anchor="middle" dominant-baseline="central" fill="#EB1000">1. IP pools</text>

  <line x1="340" y1="118" x2="340" y2="142" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="190" y="142" width="300" height="44" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text class="th" x="340" y="164" text-anchor="middle" dominant-baseline="central" fill="#000000">IPs pre-configured in system</text>

  <line x1="340" y1="186" x2="340" y2="208" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision 1 -->
  <rect x="270" y="208" width="140" height="56" rx="0" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central" fill="#000000">Shared or</text>
  <text class="ts" x="340" y="246" text-anchor="middle" dominant-baseline="central" fill="#000000">dedicated?</text>

  <line x1="270" y1="236" x2="150" y2="236" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="210" y="228" text-anchor="middle" fill="#000000">Shared</text>

  <rect x="60" y="260" width="180" height="44" rx="8" fill="#ffffff" stroke="#3B62FB" stroke-width="2.5"/>
  <text class="th" x="150" y="282" text-anchor="middle" dominant-baseline="central" fill="#3B62FB">Shared IP pool</text>

  <line x1="410" y1="236" x2="530" y2="236" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="470" y="228" text-anchor="middle" fill="#000000">Dedicated</text>

  <rect x="440" y="260" width="180" height="44" rx="8" fill="#ffffff" stroke="#5DB41F" stroke-width="2.5"/>
  <text class="th" x="530" y="282" text-anchor="middle" dominant-baseline="central" fill="#5DB41F">Dedicated IP pool</text>

  <line x1="150" y1="304" x2="150" y2="328" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="328" width="180" height="54" rx="8" fill="#ffffff" stroke="#FFA213" stroke-width="2.5"/>
  <text class="th" x="150" y="346" text-anchor="middle" dominant-baseline="central" fill="#FFA213">Customer action</text>
  <text class="ts" x="150" y="366" text-anchor="middle" dominant-baseline="central" fill="#cc7e0f">Manually create IP pool</text>

  <line x1="530" y1="304" x2="530" y2="328" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="328" width="180" height="54" rx="8" fill="#ffffff" stroke="#FFA213" stroke-width="2.5"/>
  <text class="th" x="530" y="346" text-anchor="middle" dominant-baseline="central" fill="#FFA213">Customer action</text>
  <text class="ts" x="530" y="366" text-anchor="middle" dominant-baseline="central" fill="#cc7e0f">Manually create IP pool</text>

  <path d="M150 382 L150 410 L340 410" fill="none" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M530 382 L530 410 L340 410" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="220" y="418" width="240" height="44" rx="8" fill="#ffffff" stroke="#EB1000" stroke-width="2.5"/>
  <text class="th" x="340" y="440" text-anchor="middle" dominant-baseline="central" fill="#EB1000">2. Subdomains</text>

  <line x1="340" y1="462" x2="340" y2="484" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision 2 -->
  <rect x="270" y="484" width="140" height="56" rx="0" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text class="ts" x="340" y="504" text-anchor="middle" dominant-baseline="central" fill="#000000">CNAME or</text>
  <text class="ts" x="340" y="522" text-anchor="middle" dominant-baseline="central" fill="#000000">delegated?</text>

  <line x1="270" y1="512" x2="150" y2="512" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="210" y="504" text-anchor="middle" fill="#000000">CNAME</text>

  <rect x="60" y="536" width="180" height="44" rx="8" fill="#ffffff" stroke="#3B62FB" stroke-width="2.5"/>
  <text class="th" x="150" y="558" text-anchor="middle" dominant-baseline="central" fill="#3B62FB">Partial control</text>

  <line x1="410" y1="512" x2="530" y2="512" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="470" y="504" text-anchor="middle" fill="#000000">Full delegation</text>

  <rect x="440" y="536" width="180" height="44" rx="8" fill="#ffffff" stroke="#5DB41F" stroke-width="2.5"/>
  <text class="th" x="530" y="558" text-anchor="middle" dominant-baseline="central" fill="#5DB41F">Recommended</text>

  <line x1="150" y1="580" x2="150" y2="604" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="604" width="180" height="54" rx="8" fill="#ffffff" stroke="#FFA213" stroke-width="2.5"/>
  <text class="th" x="150" y="622" text-anchor="middle" dominant-baseline="central" fill="#FFA213">Customer action</text>
  <text class="ts" x="150" y="642" text-anchor="middle" dominant-baseline="central" fill="#cc7e0f">Add CNAME DNS entry</text>

  <line x1="530" y1="580" x2="530" y2="604" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="604" width="180" height="54" rx="8" fill="#ffffff" stroke="#FFA213" stroke-width="2.5"/>
  <text class="th" x="530" y="622" text-anchor="middle" dominant-baseline="central" fill="#FFA213">Customer action</text>
  <text class="ts" x="530" y="642" text-anchor="middle" dominant-baseline="central" fill="#cc7e0f">Add DNS record entry</text>

  <path d="M150 658 L150 686 L340 686" fill="none" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M530 658 L530 686 L340 686" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="220" y="694" width="240" height="44" rx="8" fill="#ffffff" stroke="#EB1000" stroke-width="2.5"/>
  <text class="th" x="340" y="716" text-anchor="middle" dominant-baseline="central" fill="#EB1000">3. PTR records</text>

  <line x1="340" y1="738" x2="340" y2="760" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="130" y="760" width="420" height="56" rx="8" fill="#ffffff" stroke="#5DB41F" stroke-width="2.5"/>
  <text class="th" x="340" y="780" text-anchor="middle" dominant-baseline="central" fill="#5DB41F">Auto-created per IP on first subdomain</text>
  <text class="ts" x="340" y="800" text-anchor="middle" dominant-baseline="central" fill="#3a8a12">DNS records auto-created — no action needed</text>

  <line x1="340" y1="816" x2="340" y2="838" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="220" y="838" width="240" height="44" rx="8" fill="#ffffff" stroke="#EB1000" stroke-width="2.5"/>
  <text class="th" x="340" y="860" text-anchor="middle" dominant-baseline="central" fill="#EB1000">4. Suppression list</text>

  <line x1="340" y1="882" x2="340" y2="904" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="90" y="904" width="500" height="72" rx="8" fill="#ffffff" stroke="#9A47E2" stroke-width="2.5" stroke-dasharray="6 3"/>
  <text class="th" x="340" y="924" text-anchor="middle" dominant-baseline="central" fill="#9A47E2">Customer action</text>
  <text class="ts" x="340" y="944" text-anchor="middle" dominant-baseline="central" fill="#7a35be">Manually migrate Marketo Engage blocklist and suspended list</text>
  <text class="ts" x="340" y="962" text-anchor="middle" dominant-baseline="central" fill="#9A47E2">(Auto-migration not available in beta)</text>
</svg>
